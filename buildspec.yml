version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-south-1
    ECR_REPO: 897391590166.dkr.ecr.ap-south-1.amazonaws.com/password_manager_backend

phases:
  pre_build:
    commands:
      - echo Logging into ECR
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin 897391590166.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo Building Docker image
      - docker build -t backend ./backend
      - docker tag backend:latest $ECR_REPO:latest

  post_build:
    commands:
      - echo Pushing image
      - docker push $ECR_REPO:latest